- goal: "Reduce this 5 line program to just 2 lines."
  solutionDesc: "Use a `for` loop instead of repeating the code! This is a core concept called iteration."
  timeLimit: 0
  startingCode: |
    print("Hello World")
    print("Hello World")
    print("Hello World")
    print("Hello World")
    print("Hello World")
  solutionCode: |
    for i in range(5):
        print("Hello World")

- goal: "You don't need to reduce the number of lines, but the logic can be simplified."
  solutionDesc: "If `coins >= 50` is false, then coins MUST be less than 50. You don't need to check the condition again with `elif`. A regular `else` statement acts as a catch-all."
  timeLimit: 120000
  startingCode: |
    coins = 60
    if coins >= 50:
        print("You have enough!")
    elif coins < 50:
        print("Not enough coins.")
  solutionCode: |
    coins = 60
    if coins >= 50:
        print("You have enough!")
    else:
        print("Not enough coins.")

- goal: "Reduce this 5 line program to just 3 lines using a built-in function."
  solutionDesc: "Python has built-in functions that do the heavy lifting for you. Use `sum()` here."
  timeLimit: 120000
  startingCode: |
    numbers = [5, 10, 15, 20]
    total = 0
    for num in numbers:
      total = total + num
    print(total)
  solutionCode: |
    numbers = [5, 10, 15, 20]
    total = sum(numbers)
    print(total)