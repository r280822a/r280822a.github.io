- id: 1
  title: "Challenge 1"
  goal: "Reduce this 5 line program to just 2 lines using iteration."
  solutionDesc: "Use a `for` loop instead of repeating the code!"
  startingCode: |
    print("Hello World")
    print("Hello World")
    print("Hello World")
    print("Hello World")
    print("Hello World")
  solutionCode: |
    for i in range(5):
        print("Hello World")

- id: 2
  title: "Challenge 2"
  goal: "You don't need to reduce the number of lines, but the logic can be simplified."
  solutionDesc: "If `coins >= 50` is false, then coins MUST be less than 50. You don't need to check the condition again with `elif`. A regular `else` statement works fine here."
  startingCode: |
    coins = 60
    if coins >= 50:
        print("You have enough!")
    elif coins < 50:
        print("Not enough coins.")
  solutionCode: |
    coins = 60
    if coins >= 50:
        print("You have enough!")
    else:
        print("Not enough coins.")

- id: 3
  title: "Challenge 3"
  goal: "Reduce this 5 line program to just 3 lines."
  solutionDesc: "Python has built-in functions that do the heavy lifting for you. Use `sum()` here."
  startingCode: |
    numbers = [5, 10, 15, 20]
    total = 0
    for num in numbers:
      total = total + num
    print(total)"
  solutionCode: |
    numbers = [5, 10, 15, 20]
    total = sum(numbers)
    print(total)