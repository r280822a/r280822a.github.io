    def display_map(current_room):
        # We define where the (X) should appear based on the room name
        m = {
            'Pit': "(X)" if current_room == 'Pit' else "[ ]",
            'Hallway': "(X)" if current_room == 'Hallway' else "[ ]",
            'Engine Room': "(X)" if current_room == 'Engine Room' else "[ ]",
            'Escape Pod': "(X)" if current_room == 'Escape Pod' else "[ ]"
        }

        # A simple ASCII representation of the rooms
        map_layout = f"""
                STATION MAP:
            
                     {m['Pit']} Pit
                      |
        {m['Engine Room']} -------- {m['Hallway']} Hallway
        Engine        |
                     {m['Escape Pod']} Escape Pod (Goal)
        """
        print(map_layout)

    def play_game():
        rooms = {
            'Pit': {'down': 'Hallway', 'item': 'keycard'},
            'Hallway': {'up': 'Pit', 'right': 'Engine Room', 'down': 'Escape Pod', 'item': None},
            'Engine Room': {'left': 'Hallway', 'item': 'wrench'},
            'Escape Pod': {'up': 'Hallway', 'item': None}
        }

        current_room = 'Hallway'
        inventory = []

        print("--- SPACE STATION ESCAPE ---")
        print("Commands: 'go [direction]', 'get [item]', or 'map'")

        while True:
            print("-" * 30)
            print(f"Location: {current_room}")

            # Room item description
            item_here = rooms[current_room]['item']
            if item_here:
                print(f"You see a {item_here} here.")

            player_input = input("> ").strip().lower().split(None, 1)

            if not player_input:
                continue

            action = player_input[0]

            # SHOW MAP COMMAND
            if action == 'map':
                display_map(current_room)
                continue

            # MOVEMENT
            elif action == 'go':
                direction = player_input[1].capitalize() if len(player_input) > 1 else ""
                if direction in rooms[current_room]:
                    current_room = rooms[current_room][direction]

                    if current_room == 'Escape Pod':
                        if 'keycard' in inventory:
                            print("\nSUCCESS! You swiped the card and escaped the station!")
                            break
                        else:
                            print("\nThe pod door is locked. You need a keycard!")
                            current_room = 'Hallway' # Send them back to the hallway
                else:
                    print("You can't go that way!")

            # GET ITEMS
            elif action == 'get':
                target_item = player_input[1] if len(player_input) > 1 else ""
                if item_here and target_item == item_here:
                    inventory.append(item_here)
                    rooms[current_room]['item'] = None
                    print(f"Picked up: {target_item}")
                else:
                    print(f"There is no {target_item} here.")

            elif action == 'exit':
                break
            else:
                print("Unknown command. Type 'map' to see the layout.")

    play_game()

