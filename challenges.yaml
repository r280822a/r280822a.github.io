    import random

    def play_game():
        print("="*40)
        print("WELCOME TO THE GUESSING GAME!")
        print("="*40)
        print("I am thinking of a number between 1 and 100.")

        secret_number = random.randint(1, 100)
        attempts = 0
        max_attempts = 10

        while attempts < max_attempts:
            guess_str = input(f"\nAttempt {attempts + 1}/{max_attempts} - Enter your guess: ")

            # Check if the user actually entered a number
            if not guess_str.isdigit():
                print("Please enter a valid whole number.")
                continue

            guess = int(guess_str)
            attempts += 1

            # Game logic
            if guess < secret_number:
                print("Too low! Try a higher number.")
            elif guess > secret_number:
                print("Too high! Try a lower number.")
            else:
                print(f"CONGRATULATIONS! You guessed it in {attempts} attempts!")
                return # Exit the function since the user won

        # If the loop finishes without returning, the user ran out of attempts
        print(f"\nGAME OVER! You ran out of attempts. The number was {secret_number}.")

    # Main loop to allow replaying
    while True:
        play_game()

        # Ask to play again
        play_again = input("\nDo you want to play again? (y/n): ").strip().lower()
        if play_again != 'y' and play_again != 'yes':
            print("Thanks for playing! Goodbye.")
            break

