- goal: "The `calculate_total` function manually adds up 5 specific indexes. If the sensor data grows to 100 items, this will be a nightmare! Rewrite `calculate_total` to handle any size list."
  solutionDesc: "Use iteration! A `for` loop will go through every item in the list automatically, no matter how long the list is. (Alternatively, just use `return sum(data)`!)"
  timeLimitMinutes: 4
  startingCode: |
    def get_sensor_data():
        return [12, 15, 14, 19, 22]
    
    def calculate_total(data):
        total = 0
        total += data[0]
        total += data[1]
        total += data[2]
        total += data[3]
        total += data[4]
        return total
    
    def analyze_data():
        data = get_sensor_data()
        print("Total reading:", calculate_total(data))
    
    analyze_data()
  solutionCode: |
    def get_sensor_data():
        return [12, 15, 14, 19, 22]
    
    def calculate_total(data):
        total = 0
        for reading in data:
            total += reading
        return total
    
    def analyze_data():
        data = get_sensor_data()
        print("Total reading:", calculate_total(data))
    
    analyze_data()

- goal: "The `find_highest_score` function has a nested loop (a loop inside a loop). This is horribly inefficient and completely unnecessary for finding the maximum value. Fix it using a built in function."
  solutionDesc: "You only need to loop through the array once to find the highest number. Nested loops are for 2D arrays (lists of lists) or sorting algorithms, not basic linear searches. Or, even better, just use Python's built in `max(scores)`."
  timeLimitMinutes: 4
  startingCode: |
    def load_scores():
        return [45, 82, 33, 91, 77, 21]
    
    def find_highest_score(scores):
        highest = 0
        for i in range(len(scores)):
            for j in range(len(scores)):  # Why is this here?!
                if scores[i] > highest:
                    highest = scores[i]
        return highest
    
    def display_results():
        scores = load_scores()
        print("Top score:", find_highest_score(scores))
    
    display_results()
  solutionCode: |
    def load_scores():
        return [45, 82, 33, 91, 77, 21]
    
    def find_highest_score(scores):
        return max(scores)
    
    def display_results():
        scores = load_scores()
        print("Top score:", find_highest_score(scores))
    
    display_results()

- goal: "The `clean_data` function is very long and uses unnecessary variables. Can you shorten the inside of the `for` loop by chaining string methods together?"
  solutionDesc: "String methods return a new string, meaning you can attach them to each other (e.g., `.strip().capitalize()`). You can also iterate over the list items directly instead of using index numbers."
  timeLimitMinutes: 5
  startingCode: |
    def fetch_raw_names():
        return ["  smith  ", "  JONES ", "williams  "]
    
    def clean_data(names):
        cleaned = []
        for name in names:
            stripped_name = name.strip()
            lower_name = stripped_name.lower()
            cap_name = lower_name.capitalize()
            cleaned.append(cap_name)
        return cleaned
    
    def generate_report():
        raw = fetch_raw_names()
        print("Clean roster:", clean_data(raw))
    
    generate_report()
  solutionCode: |
    def fetch_raw_names():
        return ["  smith  ", "  JONES ", "williams  "]
    
    def clean_data(names):
        cleaned = []
        for name in names:
            cleaned.append(name.strip().capitalize())
        return cleaned
    
    def generate_report():
        raw = fetch_raw_names()
        print("Clean roster:", clean_data(raw))
    
    generate_report()

