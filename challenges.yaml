- goal: "We have a list of votes, but the `count_votes` function is only assigning 1 vote to everyone. Modify it to use a dictionary to accurately count how many votes each candidate got."
  solutionDesc: "Dictionaries are great for tallying. Use the candidate's name as the key. If they are already in the dictionary, increase their count by 1. If they aren't, add them with a starting count of 1."
  timeLimitMinutes: 6
  startingCode: |
    votes = ["Red", "Blue", "Red", "Green", "Blue", "Blue"]

    def count_votes(votes):
        results = {}
        for vote in votes:
            results[vote] = 1
        return results

    print(count_votes(votes))
  solutionCode: |
    votes = ["Red", "Blue", "Red", "Green", "Blue", "Blue"]

    def count_votes(votes):
        results = {}
        for vote in votes:
            if vote in results:
                results[vote] += 1
            else:
                results[vote] = 1
        return results

    print(count_votes(votes))

