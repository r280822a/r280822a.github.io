<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Python Code Challenges</title>

        <script src="https://cdn.jsdelivr.net/npm/skulpt@1.2.0/dist/skulpt.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/skulpt@1.2.0/dist/skulpt-stdlib.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>

        <style>
            :root {
                --primary: #0056b3;
                --secondary: #dbeafe;
                --bg-color: #f4f4f9;
                --card-bg: #fff;
                --text-color: black;
                --code-bg: #1e1e1e;
                --code-text: #d4d4d4;
                --console-bg: #000;
                --console-text: #0f0;
                --editor-bg: #fafafa;
                --editor-border: #ccc;
                --gutter-bg: #f0f0f0;
                --gutter-text: dimgray;
                --success: #28a745;
                --warning: #ffc107;
            }

            body {
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                background-color: var(--bg-color);
                color: var(--text-color);
                line-height: 1.6;
                margin: 0;
                padding: 20px;
            }
            header {
                text-align: center;
                margin-bottom: 40px;
            }
            h1 {
                color: var(--primary);
                margin-bottom: 10px;
            }

            #status-badge {
                display: inline-block;
                padding: 5px 12px;
                border-radius: 20px;
                font-size: 0.85rem;
                font-weight: bold;
                background-color: var(--warning);
                margin-bottom: 15px;
                transition: all 0.5s ease;
            }
            #status-badge.ready {
                background-color: var(--success);
                color: white;
            }

            .container {
                max-width: 800px;
                margin: 0 auto;
            }
            .challenge-card {
                background: var(--card-bg);
                border-radius: 8px;
                padding: 20px;
                margin-bottom: 30px;
                box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            }
            h2 {
                margin-top: 0;
                border-bottom: 2px solid var(--secondary);
                padding-bottom: 10px;
            }
            .code-container {
                background-color: var(--code-bg);
                color: var(--code-text);
                padding: 15px;
                border-radius: 5px;
                overflow-x: auto;
                font-family: 'Courier New', Courier, monospace;
                margin: 15px 0;
            }
            pre {
                margin: 0px;
            }

            .editor-wrapper {
                display: flex;
                border: 1px solid var(--editor-border);
                border-radius: 5px;
                background-color: var(--editor-bg);
                overflow: hidden;
                margin-bottom: 10px;
            }
            .line-numbers {
                width: 35px;
                padding: 10px 5px;
                text-align: right;
                background-color: var(--gutter-bg);
                color: var(--gutter-text);
                font-family: 'Courier New', Courier, monospace;
                font-size: 14px;
                line-height: 20px;
                user-select: none;
                border-right: 1px solid var(--editor-border);
            }
            textarea {
                flex: 1;
                height: auto;
                border: none;
                padding: 10px;
                font-family: 'Courier New', Courier, monospace;
                font-size: 14px;
                line-height: 20px;
                box-sizing: border-box;
                resize: vertical;
                outline: none;
                background: transparent;
                white-space: pre;
                overflow-x: auto;
            }

            .button-group {
                display: flex;
                gap: 10px;
                margin-bottom: 15px;
            }
            button {
                background-color: var(--primary);
                color: white;
                border: none;
                padding: 10px 15px;
                border-radius: 5px;
                cursor: pointer;
                font-size: 16px;
                font-weight: bold;
                margin-top: 10px;
                transition: background-color 0.3s ease;
            }
            button:hover {
                background-color: #004494;
            }
            button.run-btn {
                background-color: var(--success);
            }
            button.run-btn:hover {
                background-color: #218838;
            }

            .solution {
                display: none;
                margin-top: 15px;
                padding: 15px;
                background-color: var(--secondary);
                border-left: 4px solid var(--primary);
                border-radius: 0 5px 5px 0;
            }
            .solution.visible {
                display: block;
            }

            .output-console {
                background-color: var(--console-bg);
                color: var(--console-text);
                padding: 10px;
                border-radius: 5px;
                font-family: 'Courier New', Courier, monospace;
                min-height: 40px;
                white-space: pre-wrap;
                margin-bottom: 15px;
            }
        </style>
    </head>

    <body>
        <div class="container">
            <header>
                <h1>Python Code Challenges</h1>
                <div id="status-badge">Initializing Python Environment...</div>
                <p>If you encounter issues running code on this site, please use this alternative: <a href="https://www.online-python.com/">https://www.online-python.com/</a></p>

                <h2>The code below works, but it takes up too many lines or otherwise needs improving. Can you optimize it?</h2>
            </header>

            <div id="challenge-list"></div>
        </div>

        <script>
            // Check if BOTH Skulpt core and StdLib are loaded
            function updateStatus() {
                const badge = document.getElementById('status-badge');

                const isCoreLoaded = typeof Sk !== 'undefined' && Sk.importMainWithBody;
                const isStdLibLoaded = typeof Sk !== 'undefined' && Sk.builtinFiles && Sk.builtinFiles.files;
                
                if (isCoreLoaded && isStdLibLoaded) {
                    badge.innerText = "● Python Engine Ready";
                    badge.classList.add('ready');
                } else {
                    let errorMsg = "Engine Error: ";
                    if (!isCoreLoaded && !isStdLibLoaded) errorMsg += "Skulpt & StdLib failed to load.";
                    else if (!isCoreLoaded) errorMsg += "Core Skulpt failed to load.";
                    else if (!isStdLibLoaded) errorMsg += "Python StdLib failed to load.";
                    
                    badge.innerText = errorMsg;
                    badge.style.backgroundColor = "red";
                    badge.style.color = "white";
                }
            }

            // 1. Fetch the challenges from the JSON file
            async function loadChallenges() {
                try {
                    const response = await fetch('challenges.yaml');
                    const yamlText = await response.text();
                    const challenges = jsyaml.load(yamlText); 
                    renderChallenges(challenges);
                } catch (error) {
                    console.error("Error loading challenges:", error);
                    const container = document.getElementById('challenge-list');

                    let errorMsg = "Error loading challenges.yaml. "
                    const isYamlLoaded = typeof jsyaml !== 'undefined' && jsyaml.load;
                    if (!isYamlLoaded) errorMsg += "JS-YAML failed to load.";
                    else errorMsg += "Please ensure the file exists in the same directory.";

                    container.innerHTML = `<p style="color:red;">${errorMsg}</p>`;
                }
            }

            // 2. Build the HTML for each card dynamically
            function renderChallenges(challenges) {
                const container = document.getElementById('challenge-list');

                challenges.forEach(ch => {
                    const card = document.createElement('div');
                    card.className = 'challenge-card';
                    card.innerHTML = `
                        <h2>${ch.title}</h2>
                        <p><strong>Goal:</strong> ${ch.goal}</p>
                        <div class="code-container">
                            <pre><code>${ch.startingCode}</code></pre>
                        </div>

                        <p>Your attempt:</p>
                        <div class="editor-wrapper">
                            <div id="line-numbers-${ch.id}" class="line-numbers">1</div>
                            <textarea id="code-${ch.id}" oninput="updateLineNumbers(${ch.id})" placeholder="Type your code here..."></textarea>
                        </div>

                        <div class="button-group">
                            <button class="run-btn" onclick="runPython(${ch.id})">▶ Run Code</button>
                            <button onclick="document.getElementById('sol-${ch.id}').classList.toggle('visible')">Show / Hide Solution</button>
                        </div>

                        <p><strong>Output:</strong></p>
                        <div id="output-${ch.id}" class="output-console"></div>

                        <div id="sol-${ch.id}" class="solution">
                            <p><strong>Solution:</strong> ${ch.solutionDesc}</p>
                            <div class="code-container">
                                <pre><code>${ch.solutionCode}</code></pre>
                            </div>
                        </div>
                    `;
                    container.appendChild(card);

                    // Set up indentation and line numbers for the new textarea
                    const textarea = card.querySelector('textarea');
                    enableTabIndentation(textarea);
                    updateLineNumbers(ch.id);
                });
            }


            // Updates the line numbers on the side based on textarea content
            function updateLineNumbers(id) {
                const textarea = document.getElementById(`code-${id}`);
                const lineNumbers = document.getElementById(`line-numbers-${id}`);
                if(!textarea || !lineNumbers) return;
                const lines = textarea.value.split('\n').length;
                lineNumbers.innerHTML = Array.from({length: lines}, (_, i) => i + 1).join('<br>');
                textarea.style.height = "auto";
            }

            // Pressing tab in textarea indents line
            function enableTabIndentation(textarea) {
                textarea.addEventListener('keydown', function(e) {
                    if (e.key === 'Tab') {
                        e.preventDefault(); // Stop focus from moving to next element
                        const start = this.selectionStart;
                        const end = this.selectionEnd;

                        // Set textarea value to: text before caret + 4 spaces + text after caret
                        this.value = this.value.substring(0, start) + "    " + this.value.substring(end);
                        // Put caret in right position (after the indent)
                        this.selectionStart = this.selectionEnd = start + 4;
                    }
                });
            }

            // Runs the Python code using Skulpt
            function runPython(challengeId) {
                const code = document.getElementById(`code-${challengeId}`).value;
                const outputConsole = document.getElementById(`output-${challengeId}`);
                // Clear previous output
                outputConsole.innerHTML = ""; 

                // Configure Skulpt to intercept 'print' statements and errors
                Sk.pre = `output-${challengeId}`;
                Sk.configure({
                    output: function(text) {
                        // Append output to the specific console
                        outputConsole.innerHTML += text; 
                    },
                    read: function(x) {
                        if (Sk.builtinFiles === undefined || Sk.builtinFiles["files"][x] === undefined) {
                            throw "File not found: '" + x + "'";
                        }
                        return Sk.builtinFiles["files"][x];
                    }
                });

                // Run the code asynchronously
                const myPromise = Sk.misceval.asyncToPromise(function() {
                    return Sk.importMainWithBody("<stdin>", false, code, true);
                });

                myPromise.then(
                    function(mod) {
                        // Code finished successfully
                        if (outputConsole.innerHTML === "") {
                            outputConsole.innerHTML = "Program finished. (No output to display)";
                        }
                    },
                    function(err) {
                        // Print error in red
                        outputConsole.innerHTML = `<span style="color: red;">${err.toString()}</span>`;
                    }
                );
            }

            window.onload = function() {
                updateStatus();
                loadChallenges();
            };
        </script>
    </body>
</html>
